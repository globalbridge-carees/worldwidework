<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrueJobs - Application</title>

  <style>
    :root {
      --primary: #0A1F44;
      --accent: #F5B400;
      --light: #F4F6F9; /* same as index.html */
      --white: #ffffff;
      --dark: #222;
    }

    body {
      background: var(--light); /* unified background */
      color: var(--dark);
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
    }

    header, footer {
      background: var(--primary);
      color: var(--white);
      text-align: center;
      padding: 1rem;
    }

    .form-section {
      max-width: 600px;
      margin: 2rem auto;
      background: var(--white);
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.08);
    }

    .form-section h2 {
      color: var(--primary);
      margin-bottom: 1rem;
    }

    label {
      display: block;
      margin-top: 1rem;
      font-weight: 500;
    }

    input, select {
      width: 100%;
      padding: 0.8rem;
      margin-top: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      margin-top: 1.5rem;
      background: var(--accent);
      color: var(--primary);
      padding: 0.8rem 1.5rem;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <header>
    <h1>TrueJobs - Apply</h1>
  </header>

  <div class="form-section">
    <h2>Submit Your Application</h2>
    <form>
      <label>Full Name *</label>
      <input type="text" name="fullname" required>

      <label>Email Address *</label>
      <input type="email" name="email" required>

      <label>Phone Number *</label>
      <input type="tel" name="phone" required>

      <label>Relevant Experience *</label>
      <input type="text" name="experience" required>

      <label>Key Skills *</label>
      <input type="text" name="skills" placeholder="e.g., Writing, Data Entry, Teaching" required>

      <label>Preferred Opportunities *</label>
      <select name="opportunities" required>
        <option value="">Select one</option>
        <option value="writing">Writing</option>
        <option value="data-entry">Data Entry</option>
        <option value="teaching">Teaching</option>
      </select>

      <button type="submit">Submit Application</button>
    </form>
  </div>

  <footer>
    © 2026 TrueJobs. All rights reserved.
  </footer>
</body>
</html>
