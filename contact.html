<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WritingHub - Contact Us</title>

  <style>
    :root {
      --primary: #0A1F44;
      --accent: #F5B400;
      --light: #F4F6F9; /* same background as index.html */
      --white: #ffffff;
      --dark: #222;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: var(--light); /* unified background */
      color: var(--dark);
    }

    header {
      background: var(--primary);
      color: var(--white);
      text-align: center;
      padding: 1rem;
    }

    .contact-section {
      max-width: 700px;
      margin: 2rem auto;
      background: var(--white);
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.08);
    }

    .contact-section h2 {
      color: var(--primary);
      margin-bottom: 1rem;
      text-align: center;
    }

    label {
      display: block;
      margin-top: 1rem;
      font-weight: 500;
    }

    input, textarea {
      width: 100%;
      padding: 0.8rem;
      margin-top: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    textarea {
      min-height: 120px;
    }

    button {
      margin-top: 1.5rem;
      background: var(--accent);
      color: var(--primary);
      padding: 0.8rem 1.5rem;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    footer {
      text-align: center;
      padding: 1rem;
      background: #081730;
      color: var(--white);
      font-size: 0.85rem;
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Contact Us</h1>
  </header>

  <div class="contact-section">
    <h2>We’d love to hear from you</h2>
    <form>
      <label>Your Name *</label>
      <input type="text" name="name" required>

      <label>Email Address *</label>
      <input type="email" name="email" required>

      <label>Message *</label>
      <textarea name="message" required></textarea>

      <button type="submit">Send Message</button>
    </form>
  </div>

  <footer>
    © 2026 WritingHub. All rights reserved.
  </footer>
</body>
</html>
