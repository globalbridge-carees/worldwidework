<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Company Profile - TrueJobs</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #f0f5fa;
            color: #1e293b;
            line-height: 1.5;
        }

        :root {
            --primary: #0f2b4b;
            --primary-light: #1e3a6a;
            --primary-dark: #0a1f36;
            --accent: #f59e0b;
            --accent-light: #fbbf24;
            --accent-dark: #d97706;
            --success: #10b981;
            --success-light: #34d399;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --gray-900: #0f172a;
            --white: #ffffff;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            --shadow-2xl: 0 25px 50px -12px rgb(0 0 0 / 0.25);
        }

        .container {
            width: 100%;
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        @media (min-width: 640px) { .container { padding: 0 1.5rem; } }
        @media (min-width: 1024px) { .container { padding: 0 2rem; } }

        /* Animations */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(245, 158, 11, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }
        @keyframes pulse-green {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
        @keyframes pulse-blue {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(15, 43, 75, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(15, 43, 75, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(15, 43, 75, 0); }
        }

        .pulse-btn { animation: pulse 2s infinite; }
        .pulse-verified { animation: pulse-green 2s infinite; }
        .pulse-apply { animation: pulse-blue 2s infinite; }

        /* Navigation */
        .navbar {
            background: var(--white);
            padding: 0.8rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow-md);
            border-bottom: 2px solid var(--accent);
        }
        .nav-container {
            width: 100%;
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { display: flex; align-items: center; gap: 0.4rem; text-decoration: none; }
        .logo-icon {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: var(--accent);
            width: 35px;
            height: 35px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 800;
        }
        .logo-text { font-size: 1.3rem; font-weight: 700; color: var(--primary); }
        @media (min-width: 768px) {
            .logo-icon { width: 45px; height: 45px; font-size: 1.8rem; }
            .logo-text { font-size: 1.8rem; }
        }
        .nav-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: var(--white);
            padding: 1rem;
            box-shadow: var(--shadow-lg);
            border-top: 2px solid var(--accent);
            list-style: none;
        }
        .nav-menu.show { display: flex; flex-direction: column; gap: 0.8rem; }
        .nav-menu a { color: var(--gray-600); text-decoration: none; font-weight: 500; font-size: 0.95rem; padding: 0.5rem 0; display: block; }
        @media (min-width: 768px) {
            .nav-menu { display: flex; position: static; width: auto; padding: 0; box-shadow: none; border-top: none; flex-direction: row; gap: 1.5rem; background: transparent; }
            .nav-menu a { padding: 0; }
        }
        .nav-menu a:hover { color: var(--accent); }
        .nav-menu a.active { color: var(--primary); font-weight: 600; }
        .auth-buttons { display: flex; gap: 0.5rem; }
        .btn-outline { padding: 0.4rem 1rem; border: 1.5px solid var(--gray-300); background: transparent; border-radius: 30px; font-weight: 500; font-size: 0.85rem; cursor: pointer; }
        .btn-primary { padding: 0.4rem 1rem; background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: var(--white); border: none; border-radius: 30px; font-weight: 500; font-size: 0.85rem; cursor: pointer; }
        .menu-toggle { display: block; font-size: 1.5rem; color: var(--primary); cursor: pointer; }
        @media (min-width: 768px) { .menu-toggle { display: none; } }

        .back-link { padding: 1rem 0 0.5rem; }
        .back-link a { color: var(--gray-600); text-decoration: none; display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.9rem; }

        .company-cover {
            height: 200px;
            background: linear-gradient(135deg, rgba(15,43,75,0.7), rgba(30,58,106,0.8)), url('https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?ixlib=rb-1.2.1&auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            border-radius: 24px 24px 0 0;
            position: relative;
            margin-bottom: 4rem;
        }
        @media (min-width: 768px) { .company-cover { height: 280px; margin-bottom: 5rem; border-radius: 32px 32px 0 0; } }
        @media (min-width: 1024px) { .company-cover { height: 350px; margin-bottom: 6rem; } }

        .profile-card {
            background: var(--white);
            border-radius: 28px;
            padding: 2rem;
            box-shadow: var(--shadow-2xl);
            margin-top: -80px;
            position: relative;
            z-index: 20;
            border: 1px solid var(--gray-200);
        }
        @media (min-width: 768px) { .profile-card { padding: 2.5rem; margin-top: -100px; border-radius: 32px; } }
        @media (min-width: 1024px) { .profile-card { margin-top: -120px; padding: 3rem; border-radius: 36px; } }

        .profile-header { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; margin-bottom: 2rem; }
        @media (min-width: 768px) { .profile-header { flex-direction: row; align-items: flex-start; gap: 2.5rem; } }
        .company-logo-large {
            width: 100px; height: 100px; background: linear-gradient(135deg, var(--accent-light), var(--accent-dark));
            border-radius: 26px; display: flex; align-items: center; justify-content: center; color: var(--white);
            font-size: 2.5rem; font-weight: 700; box-shadow: var(--shadow-xl); flex-shrink: 0; border: 4px solid var(--white);
        }
        @media (min-width: 768px) { .company-logo-large { width: 120px; height: 120px; font-size: 3rem; } }
        @media (min-width: 1024px) { .company-logo-large { width: 140px; height: 140px; font-size: 3.5rem; } }
        
        .company-title-section { flex: 1; width: 100%; text-align: center; }
        @media (min-width: 768px) { .company-title-section { text-align: left; } }
        .company-title-section h1 { font-size: 2rem; color: var(--primary); margin-bottom: 0.8rem; font-weight: 800; }
        @media (min-width: 768px) { .company-title-section h1 { font-size: 2.5rem; } }
        
        .company-badge-wrapper { display: flex; flex-direction: column; align-items: center; gap: 0.8rem; margin-bottom: 1rem; }
        @media (min-width: 640px) { .company-badge-wrapper { flex-direction: row; gap: 1.5rem; } }
        .verified-badge-large {
            display: inline-flex; align-items: center; gap: 0.5rem;
            background: linear-gradient(135deg, var(--success), var(--success-light));
            color: var(--white); padding: 0.6rem 1.5rem; border-radius: 50px; font-size: 1rem; font-weight: 600;
        }
        .rating-badge { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--gray-700); }
        .rating-badge i { color: var(--accent); }
        
        .company-meta-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 1.2rem 2rem; margin-top: 1rem; }
        @media (min-width: 768px) { .company-meta-row { justify-content: flex-start; } }
        .meta-item { display: flex; align-items: center; gap: 0.5rem; color: var(--gray-600); font-size: 0.95rem; }
        .meta-item i { color: var(--accent); width: 18px; }
        
        .follow-btn { padding: 0.8rem 2.2rem; background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: var(--white); border: none; border-radius: 50px; font-weight: 600; font-size: 1rem; cursor: pointer; display: inline-flex; align-items: center; gap: 0.5rem; transition: all 0.3s ease; }
        .follow-btn.following { background: linear-gradient(135deg, var(--success), var(--success-light)); }
        .follow-btn:hover { transform: translateY(-3px); }
        
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin: 2rem 0 0.5rem; padding-top: 2rem; border-top: 2px solid var(--gray-200); }
        @media (min-width: 640px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
        .stat-card { text-align: center; padding: 1.2rem 0.8rem; background: var(--gray-50); border-radius: 20px; transition: all 0.3s ease; }
        .stat-card:hover { transform: translateY(-5px); background: var(--white); }
        .stat-number { font-size: 1.6rem; font-weight: 800; color: var(--primary); }
        @media (min-width: 768px) { .stat-number { font-size: 2rem; } }
        .stat-label { color: var(--gray-500); font-size: 0.8rem; }
        
        .main-grid { display: grid; grid-template-columns: 1fr; gap: 1.5rem; margin: 2rem 0; }
        @media (min-width: 1024px) { .main-grid { grid-template-columns: 2fr 1fr; gap: 2rem; } }
        
        .about-section, .company-sidebar, .jobs-section, .reviews-section {
            background: var(--white); border-radius: 24px; padding: 1.8rem; box-shadow: var(--shadow-lg); border: 1px solid var(--gray-200);
        }
        .section-title { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 1.5rem; }
        .section-title i { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent-light), var(--accent)); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--white); font-size: 1.1rem; }
        .section-title h2 { color: var(--primary); font-size: 1.3rem; font-weight: 600; }
        .company-description { color: var(--gray-700); margin-bottom: 1.5rem; font-size: 0.95rem; line-height: 1.6; }
        
        .info-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; margin: 1.5rem 0; }
        @media (min-width: 480px) { .info-grid { grid-template-columns: repeat(2, 1fr); } }
        .info-item { display: flex; align-items: center; gap: 1rem; padding: 1rem; background: var(--gray-50); border-radius: 14px; }
        .info-item i { width: 36px; height: 36px; background: var(--white); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: 1.1rem; flex-shrink: 0; }
        .info-content h4 { color: var(--gray-500); font-size: 0.8rem; margin-bottom: 0.2rem; }
        .info-content p { color: var(--primary); font-weight: 600; font-size: 0.95rem; }
        
        .benefits-list { list-style: none; }
        .benefits-list li { display: flex; gap: 1rem; margin-bottom: 1rem; font-size: 0.95rem; align-items: flex-start; }
        .benefits-list li i { color: var(--success); flex-shrink: 0; margin-top: 0.2rem; }
        
        .jobs-grid { display: grid; grid-template-columns: 1fr; gap: 1.2rem; margin: 1.5rem 0; }
        @media (min-width: 640px) { .jobs-grid { grid-template-columns: repeat(2, 1fr); } }
        .job-card { background: var(--gray-50); border-radius: 18px; padding: 1.5rem; border: 1px solid var(--gray-200); transition: all 0.3s ease; cursor: pointer; }
        .job-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); border-color: var(--accent); }
        .job-card h4 { color: var(--primary); font-size: 1.2rem; margin-bottom: 0.6rem; font-weight: 600; }
        .job-location { display: flex; align-items: center; gap: 0.3rem; color: var(--gray-500); font-size: 0.9rem; margin-bottom: 0.8rem; }
        .job-location i { color: var(--accent); }
        .job-type { display: inline-block; padding: 0.3rem 1rem; background: var(--gray-200); border-radius: 30px; font-size: 0.8rem; color: var(--gray-600); margin-bottom: 1rem; }
        .job-salary { color: var(--success); font-weight: 700; font-size: 1.1rem; margin-bottom: 1.2rem; }
        .job-apply-btn { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: var(--white); border: none; padding: 0.8rem; border-radius: 40px; font-weight: 600; font-size: 0.95rem; width: 100%; cursor: pointer; transition: all 0.3s ease; animation: pulse-blue 2s infinite; }
        .job-apply-btn:hover { transform: scale(1.05); animation: none; }
        .view-all-link { display: block; text-align: center; margin-top: 1.5rem; color: var(--accent); text-decoration: none; font-weight: 600; }
        
        .contact-item { display: flex; align-items: center; gap: 1rem; padding: 1rem 0; border-bottom: 1px solid var(--gray-100); font-size: 0.95rem; }
        .contact-item i { width: 30px; color: var(--accent); }
        .social-links { display: flex; gap: 1rem; margin: 1.5rem 0; flex-wrap: wrap; }
        .social-link { width: 42px; height: 42px; background: var(--gray-100); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--primary); text-decoration: none; transition: all 0.3s ease; }
        .social-link:hover { background: var(--accent); color: var(--white); transform: translateY(-5px); }
        
        .map-placeholder { width: 100%; height: 140px; background: linear-gradient(135deg, var(--gray-100), var(--gray-200)); border-radius: 16px; display: flex; align-items: center; justify-content: center; color: var(--gray-600); cursor: pointer; margin: 1.5rem 0; }
        
        .similar-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; margin-top: 1.2rem; }
        @media (min-width: 480px) { .similar-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .similar-grid { grid-template-columns: repeat(4, 1fr); } }
        .similar-company-card { background: var(--gray-50); border-radius: 18px; padding: 1.5rem; text-align: center; border: 1px solid var(--gray-200); cursor: pointer; transition: all 0.3s ease; }
        .similar-company-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .similar-logo { width: 60px; height: 60px; background: linear-gradient(135deg, var(--accent-light), var(--accent)); border-radius: 18px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; color: var(--white); font-weight: 700; font-size: 1.5rem; }
        .similar-company-card h4 { font-size: 1.1rem; color: var(--primary); }
        .similar-company-card .industry { font-size: 0.85rem; color: var(--gray-500); }
        .similar-company-card .jobs-count { font-size: 0.9rem; color: var(--accent); font-weight: 600; }
        
        .footer { background: var(--white); padding: 2rem 0; margin-top: 3rem; border-top: 1px solid var(--gray-200); }
        .footer-content { display: flex; flex-direction: column; gap: 1rem; text-align: center; color: var(--gray-500); }
        @media (min-width: 768px) { .footer-content { flex-direction: row; justify-content: space-between; text-align: left; } }
        .footer-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 1.5rem; }
        .footer-links a { color: var(--gray-500); text-decoration: none; }
        .footer-links a:hover { color: var(--accent); }
        
        .loading-spinner { text-align: center; padding: 2rem; color: var(--gray-500); }
        .loading-spinner i { font-size: 2rem; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .mt-2 { margin-top: 1rem; }
        .mt-3 { margin-top: 1.5rem; }
    </style>
</head>

        </div>

        <div class="main-grid" id="mainGrid" style="display: none;">

    <script>
        // ==================== SUPABASE CONFIGURATION ====================
        const SUPABASE_URL = 'https://jvcbkarjffwkknumluri.supabase.co';  // Replace with your Supabase URL
        const SUPABASE_ANON_KEY = 'sb_publishable_LpfhnoupMBpjtloCl2fu_w_LZUz5_yv';  // Replace with your Supabase anon key
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentCompany = null;
        let companyJobs = [];
        
        // Get company ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const companyId = urlParams.get('id') || 'mediclinic';
        const companyNameFromUrl = urlParams.get('name') || 'Mediclinic Hospital';
        
        async function loadCompanyData() {
            try {
                let query;
                if (companyId && companyId !== 'mediclinic') {
                    query = supabase.from('companies').select('*').eq('id', companyId);
                } else {
                    query = supabase.from('companies').select('*').ilike('name', `%${companyNameFromUrl}%`);
                }
                
                const { data: companyData, error: companyError } = await query;
                if (companyError) throw companyError;
                
                if (companyData && companyData.length > 0) {
                    currentCompany = companyData[0];
                    document.title = `${currentCompany.name} - Company Profile | TrueJobs`;
                } else {
                    // Fallback to default data
                    currentCompany = {
                        id: 'mediclinic',
                        name: 'Mediclinic Hospital',
                        industry: 'Healthcare',
                        location: 'Dubai, UAE',
                        employees: '5,000+ Employees',
                        founded: '1998',
                        description: 'Mediclinic Hospital is a leading healthcare provider in the UAE, offering world-class medical services across multiple specialties. Our hospital is accredited by Joint Commission International (JCI).',
                        website: 'www.mediclinic.ae',
                        email: 'careers@mediclinic.ae',
                        phone: '+971 4 123 4567',
                        address: 'Sheikh Zayed Road, Dubai',
                        logo: 'MC',
                        verified: true,
                        rating: 4.5,
                        reviews_count: 128,
                        jobs_count: 52,
                        benefits: ['Competitive tax-free salaries', 'Free accommodation', 'Annual flight tickets', 'Health insurance', '30 days annual leave']
                    };
                }
                
                // Load jobs for this company
                const { data: jobsData, error: jobsError } = await supabase
                    .from('jobs')
                    .select('*')
                    .ilike('company', `%${currentCompany.name}%`)
                    .limit(4);
                
                if (!jobsError && jobsData) {
                    companyJobs = jobsData;
                } else {
                    companyJobs = getDefaultJobs();
                }
                
                // Load similar companies
                const { data: similarData, error: similarError } = await supabase
                    .from('companies')
                    .select('*')
                    .neq('id', currentCompany.id)
                    .eq('industry', currentCompany.industry)
                    .limit(4);
                
                renderAllSections();
                
            } catch (error) {
                console.error('Error loading company:', error);
                renderAllSections(); // Render with fallback data
            }
        }
        
        function getDefaultJobs() {
            return [
                { id: 1, title: 'Senior Nurse', location: 'Dubai, UAE', type: 'Full Time', salary: '$3,500 - $4,500/mo' },
                { id: 2, title: 'ICU Nurse', location: 'Dubai, UAE', type: 'Full Time', salary: '$3,200 - $4,000/mo' },
                { id: 3, title: 'Pediatric Nurse', location: 'Abu Dhabi', type: 'Full Time', salary: '$3,000 - $3,800/mo' },
                { id: 4, title: 'Nurse Manager', location: 'Dubai, UAE', type: 'Full Time', salary: '$4,500 - $5,500/mo' }
            ];
        }
        
        function renderAllSections() {
            document.getElementById('profileCard').innerHTML = renderProfileCard();
            document.getElementById('aboutSection').innerHTML = renderAboutSection();
            document.getElementById('jobsSection').innerHTML = renderJobsSection();
            document.getElementById('reviewsSection').innerHTML = renderReviewsSection();
            document.getElementById('sidebarSection').innerHTML = renderSidebar();
            document.getElementById('similarGrid').innerHTML = renderSimilarCompanies();
            document.getElementById('mainGrid').style.display = 'grid';
            document.getElementById('similarSection').style.display = 'block';
        }
        
        function renderProfileCard() {
            const stats = [
                { number: currentCompany.jobs_count || '50+', label: 'Open Jobs' },
                { number: currentCompany.employees || '5K+', label: 'Employees' },
                { number: currentCompany.founded ? (new Date().getFullYear() - parseInt(currentCompany.founded) + '+ Years') : '25+ Years', label: 'Experience' },
                { number: '10K+', label: 'Hired' }
            ];
            
            return `
                <div class="profile-header">
                    <div class="company-logo-large">${currentCompany.logo || currentCompany.name.charAt(0) + (currentCompany.name.split(' ')[1]?.charAt(0) || '')}</div>
                    <div class="company-title-section">
                        <h1>${escapeHtml(currentCompany.name)}</h1>
                        <div class="company-badge-wrapper">
                            <span class="verified-badge-large pulse-verified"><i class="fas fa-check-circle"></i> Verified Employer</span>
                            <span class="rating-badge"><i class="fas fa-star"></i> ${currentCompany.rating || 4.5} <span style="color: var(--gray-500);">(${currentCompany.reviews_count || 128} reviews)</span></span>
                        </div>
                        <div class="company-meta-row">
                            <span class="meta-item"><i class="fas fa-building"></i> ${escapeHtml(currentCompany.industry || 'Healthcare')}</span>
                            <span class="meta-item"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(currentCompany.location || 'Dubai, UAE')}</span>
                            <span class="meta-item"><i class="fas fa-calendar-alt"></i> Est. ${escapeHtml(currentCompany.founded || '1998')}</span>
                            <span class="meta-item"><i class="fas fa-globe"></i> ${currentCompany.locations || '10+ Locations'}</span>
                        </div>
                    </div>
                    <div class="follow-btn-wrapper">
                        <button class="follow-btn" onclick="toggleFollow()" id="followBtn"><i class="far fa-bookmark"></i> Follow</button>
                    </div>
                </div>
                <div class="stats-grid">
                    ${stats.map(stat => `<div class="stat-card"><div class="stat-number">${stat.number}</div><div class="stat-label">${stat.label}</div></div>`).join('')}
                </div>
            `;
        }
        
        function renderAboutSection() {
            const infoItems = [
                { icon: 'fas fa-users', label: 'Company Size', value: currentCompany.employees || '5,000+ Employees' },
                { icon: 'fas fa-globe', label: 'Global Locations', value: '10+ Countries' },
                { icon: 'fas fa-trophy', label: 'Industry Awards', value: '25+ Awards' },
                { icon: 'fas fa-clock', label: 'Founded', value: currentCompany.founded || '1998' }
            ];
            
            const benefits = currentCompany.benefits || [
                'Competitive tax-free salaries', 'Free accommodation for international staff',
                'Annual flight tickets home', 'Comprehensive health insurance', '30 days annual leave'
            ];
            
            return `
                <div class="section-title"><i class="fas fa-building"></i><h2>About Company</h2></div>
                <div class="company-description">
                    <p>${escapeHtml(currentCompany.description || 'A leading healthcare provider offering world-class medical services across multiple specialties.')}</p>
                </div>
                <div class="info-grid">
                    ${infoItems.map(item => `
                        <div class="info-item"><i class="${item.icon}"></i><div class="info-content"><h4>${item.label}</h4><p>${item.value}</p></div></div>
                    `).join('')}
                </div>
                <div class="section-title mt-3"><i class="fas fa-heart"></i><h2>Why Work With Us</h2></div>
                <ul class="benefits-list">
                    ${benefits.map(b => `<li><i class="fas fa-check-circle"></i> <span>${escapeHtml(b)}</span></li>`).join('')}
                </ul>
            `;
        }
        
        function renderJobsSection() {
            const jobs = companyJobs.slice(0, 4);
            return `
                <div class="section-title"><i class="fas fa-briefcase"></i><h2>Open Positions (${currentCompany.jobs_count || '50+'})</h2></div>
                <div class="jobs-grid">
                    ${jobs.map(job => `
                        <div class="job-card" onclick="location.href='job-details.html?id=${job.id}'">
                            <h4>${escapeHtml(job.title)}</h4>
                            <div class="job-location"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(job.location || 'Dubai, UAE')}</div>
                            <span class="job-type">${escapeHtml(job.type || 'Full Time')}</span>
                            <div class="job-salary">${escapeHtml(job.salary || 'Competitive')}</div>
                            <button class="job-apply-btn pulse-apply" onclick="event.stopPropagation(); applyForJob('${job.id}', '${escapeHtml(job.title)}')">Apply Now</button>
                        </div>
                    `).join('')}
                </div>
                <a href="findjobs.html?company=${encodeURIComponent(currentCompany.name)}" class="view-all-link">View All Jobs <i class="fas fa-arrow-right"></i></a>
            `;
        }
        
        function renderReviewsSection() {
            return `
                <div class="section-title"><i class="fas fa-star"></i><h2>Employee Reviews</h2></div>
                <div class="rating-overview">
                    <div class="average-rating">
                        <div class="average-number">${currentCompany.rating || 4.5}</div>
                        <div class="stars">★★★★½</div>
                        <div style="font-size: 0.9rem;">${currentCompany.reviews_count || 128} reviews</div>
                    </div>
                    <div class="rating-bars">
                        ${[70, 20, 7, 2, 1].map((width, i) => `
                            <div class="rating-bar-item"><span>${5-i}★</span> <div class="bar-container"><div class="bar-fill" style="width: ${width}%"></div></div> <span>${width}%</span></div>
                        `).join('')}
                    </div>
                </div>
                <div class="review-card">
                    <div class="review-header"><div class="reviewer-avatar">SA</div><div class="reviewer-info"><h4>Sarah Ahmed</h4><div class="position">Senior Nurse</div></div></div>
                    <div class="review-rating">★★★★★</div>
                    <p class="review-text">"Great place to work! Excellent benefits and supportive management."</p>
                </div>
                <div class="review-card">
                    <div class="review-header"><div class="reviewer-avatar">MK</div><div class="reviewer-info"><h4>Mohammed Khalid</h4><div class="position">ICU Nurse</div></div></div>
                    <div class="review-rating">★★★★½</div>
                    <p class="review-text">"Competitive salary and great team environment. Highly recommended."</p>
                </div>
            `;
        }
        
        function renderSidebar() {
            return `
                <div class="section-title"><i class="fas fa-address-card"></i><h2>Contact Info</h2></div>
                <div class="contact-info">
                    <div class="contact-item"><i class="fas fa-map-marker-alt"></i><span>${escapeHtml(currentCompany.address || 'Sheikh Zayed Road, Dubai')}</span></div>
                    <div class="contact-item"><i class="fas fa-phone"></i><span>${escapeHtml(currentCompany.phone || '+971 4 123 4567')}</span></div>
                    <div class="contact-item"><i class="fas fa-envelope"></i><span>${escapeHtml(currentCompany.email || 'careers@mediclinic.ae')}</span></div>
                    <div class="contact-item"><i class="fas fa-globe"></i><span>${escapeHtml(currentCompany.website || 'www.mediclinic.ae')}</span></div>
                </div>
                <div class="social-links">
                    <a href="#" class="social-link"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="social-link"><i class="fab fa-twitter"></i></a>
                    <a href="#" class="social-link"><i class="fab fa-linkedin-in"></i></a>
                    <a href="#" class="social-link"><i class="fab fa-instagram"></i></a>
                </div>
                <div class="map-placeholder" onclick="showMap()"><i class="fas fa-map"></i> View on Google Maps</div>
                <div class="section-title mt-3"><i class="fas fa-clock"></i><h2>Working Hours</h2></div>
                <div class="contact-item"><i class="fas fa-calendar-alt"></i><span>Mon-Fri: 9AM - 6PM</span></div>
            `;
        }
        
        function renderSimilarCompanies() {
            return `<div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i> Loading similar companies...</div>`;
        }
        
        async function loadSimilarCompanies() {
            if (!currentCompany) return;
            try {
                const { data, error } = await supabase
                    .from('companies')
                    .select('*')
                    .neq('name', currentCompany.name)
                    .eq('industry', currentCompany.industry || 'Healthcare')
                    .limit(4);
                
                if (!error && data && data.length > 0) {
                    document.getElementById('similarGrid').innerHTML = data.map(comp => `
                        <div class="similar-company-card" onclick="location.href='company-detail.html?id=${comp.id}&name=${encodeURIComponent(comp.name)}'">
                            <div class="similar-logo">${comp.logo || comp.name.charAt(0) + (comp.name.split(' ')[1]?.charAt(0) || '')}</div>
                            <h4>${escapeHtml(comp.name)}</h4>
                            <div class="industry">${escapeHtml(comp.industry || 'Healthcare')}</div>
                            <div class="jobs-count">${comp.jobs_count || '30+'} jobs</div>
                        </div>
                    `).join('');
                } else {
                    document.getElementById('similarGrid').innerHTML = getDefaultSimilarCompanies();
                }
            } catch (error) {
                document.getElementById('similarGrid').innerHTML = getDefaultSimilarCompanies();
            }
        }
        
        function getDefaultSimilarCompanies() {
            const defaults = [
                { name: 'American Hospital', logo: 'AH', industry: 'Healthcare', jobs: '35 jobs' },
                { name: 'Cleveland Clinic', logo: 'CC', industry: 'Healthcare', jobs: '42 jobs' },
                { name: "King's College", logo: 'KC', industry: 'Healthcare', jobs: '28 jobs' },
                { name: 'NMC Healthcare', logo: 'NH', industry: 'Healthcare', jobs: '31 jobs' }
            ];
            return defaults.map(comp => `
                <div class="similar-company-card" onclick="location.href='company-detail.html?name=${encodeURIComponent(comp.name)}'">
                    <div class="similar-logo">${comp.logo}</div>
                    <h4>${comp.name}</h4>
                    <div class="industry">${comp.industry}</div>
                    <div class="jobs-count">${comp.jobs}</div>
                </div>
            `).join('');
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function toggleFollow() {
            const btn = document.getElementById('followBtn');
            if (btn.classList.contains('following')) {
                btn.classList.remove('following');
                btn.innerHTML = '<i class="far fa-bookmark"></i> Follow';
            } else {
                btn.classList.add('following');
                btn.innerHTML = '<i class="fas fa-check"></i> Following';
                showNotification(`Now following ${currentCompany.name}`);
            }
        }
        
        function applyForJob(jobId, jobTitle) {
            showNotification(`Applying for ${jobTitle}...`);
            setTimeout(() => {
                window.location.href = `apply.html?job=${encodeURIComponent(jobTitle)}&company=${encodeURIComponent(currentCompany.name)}&jobId=${jobId}`;
            }, 800);
        }
        
        function showMap() { alert('Map feature coming soon!'); }
        
        function showNotification(message) {
            const notification = document.createElement('div');
            notification.style.cssText = `position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--success); color: white; padding: 0.8rem 1.5rem; border-radius: 50px; z-index: 9999; font-weight: 500; animation: slideIn 0.3s ease;`;
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 2000);
        }
        
        function toggleMenu() { document.getElementById('navMenu').classList.toggle('show'); }
        
        loadCompanyData();
        setTimeout(() => loadSimilarCompanies(), 1000);
    </script>
</body>
</html>
